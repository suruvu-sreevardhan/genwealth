name: fin_mobile
description: GenWealth — AI-powered personal finance manager.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  http: ^1.6.0
  flutter_secure_storage: ^8.0.0
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_dotenv: ^5.0.2
  fl_chart: ^0.65.0
  permission_handler: ^11.0.1
  telephony: ^0.2.0
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.4

flutter_native_splash:
  color: "#0B0C0E"
  image: assets/images/finlit_full_logo.png
  android_12:
    color: "#0B0C0E"
    image: assets/images/finlit_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/finlit_icon.png
  adaptive_icon_background: "#0F1115"
  adaptive_icon_foreground: assets/images/finlit_icon.png

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/transaction_icons/
